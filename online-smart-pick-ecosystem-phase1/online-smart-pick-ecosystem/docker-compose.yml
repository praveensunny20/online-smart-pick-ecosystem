# =============================================================
# Online Smart Pick Ecosystem — Docker Compose
# =============================================================
# Services:
#   - postgres: PostgreSQL 16 database
#   - redis:    Redis 7 cache / Celery broker
#   - backend:  FastAPI app (Phase 1)
#
# Run:
#   docker compose up           # start everything
#   docker compose up -d        # start in background
#   docker compose down         # stop everything (data kept)
#   docker compose down -v      # stop and WIPE data
#   docker compose logs -f backend   # tail backend logs
# =============================================================

services:
  # -----------------------------------------------------------
  # PostgreSQL 16 — primary database
  # -----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smartpick_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smartpick}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartpick_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-smartpick_db}
      # Encode with UTF-8 and enable trust checksums for data integrity
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C --data-checksums"
    ports:
      - "5432:5432"
    volumes:
      # Persistent data volume — survives `docker compose down` (but not `down -v`)
      - postgres_data:/var/lib/postgresql/data
      # Init script runs once when the DB is first created
      - ./backend/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smartpick} -d ${POSTGRES_DB:-smartpick_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - smartpick_net

  # -----------------------------------------------------------
  # Redis 7 — cache and Celery broker
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: smartpick_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # AOF (append-only file) persistence — safer than snapshots alone
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - smartpick_net

  # -----------------------------------------------------------
  # FastAPI backend
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartpick_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override hosts so the app connects to the compose service names,
      # not "localhost" (which would be the container itself).
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for live-reload during development.
      # Remove this volume in production so the image's code is used.
      - ./backend:/app
    # Wait for postgres and redis to be healthy before starting
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # --reload enables auto-restart when code changes (dev only)
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
    networks:
      - smartpick_net


# -----------------------------------------------------------
# Named volumes — data survives container restarts
# -----------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local


# -----------------------------------------------------------
# Private network so services can talk by name
# -----------------------------------------------------------
networks:
  smartpick_net:
    driver: bridge
