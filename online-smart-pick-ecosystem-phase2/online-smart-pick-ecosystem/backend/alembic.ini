# Alembic configuration for Online Smart Pick Ecosystem.
#
# The actual DB URL is injected at runtime from settings, not from here.
# See alembic/env.py — it overrides sqlalchemy.url using app.core.config.settings.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used for new migrations. "%" characters must be escaped as "%%".
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of a slug generated from a message
truncate_slug_length = 40

# Version locations — where migration scripts live
version_locations = %(here)s/alembic/versions

# Path separator
version_path_separator = os

# Placeholder — will be overridden in env.py
sqlalchemy.url = postgresql+psycopg2://smartpick:smartpick_dev_password@localhost:5432/smartpick_db


[post_write_hooks]
# No hooks configured


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
